function setLanguage(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    let key = el.getAttribute('data-i18n');
    if (translations[lang][key]) el.textContent = translations[lang][key];
  });

  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    let key = el.getAttribute('data-i18n-html');
    if (translations[lang][key]) el.innerHTML = translations[lang][key];
  });

  document.querySelectorAll('[data-i18n-alt]').forEach(el => {
    let key = el.getAttribute('data-i18n-alt');
    if (translations[lang][key]) el.alt = translations[lang][key];
  });

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang-btn') === lang);
  });

  document.title = translations[lang].tab_title + " - Estepona";
}

document.addEventListener('DOMContentLoaded', () => {
  setLanguage((navigator.language || 'en').slice(0,2));
});
