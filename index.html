<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
  }

  .container {
    max-width: 760px;
    margin: auto;
    padding: 30px 20px;
  }

  .lang-switch {
    text-align: right;
    margin-bottom: 20px;
  }

  .lang-switch button {
    border: none;
    background: #eaeaea;
    padding: 6px 10px;
    margin-left: 5px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }

  .lang-switch button.active {
    background: #000;
    color: white;
  }

  .hero {
    text-align: center;
    margin-bottom: 30px;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.04);
  }

  h1 { font-size: 28px; }
  h2 { font-size: 18px; }

  p {
    color: #666;
    font-size: 14px;
    line-height: 1.6;
  }

  .button {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
  }

  .primary { background: black; color: white; }
  .secondary { background: #eee; color: #333; }

</style>
</head>

<body>

<div class="container">

  <!-- LANGUAGE SWITCH -->
  <div class="lang-switch">
    <button onclick="setLang('en')" id="btn-en" class="active">EN</button>
    <button onclick="setLang('es')" id="btn-es">ES</button>
    <button onclick="setLang('fr')" id="btn-fr">FR</button>
    <button onclick="setLang('de')" id="btn-de">DE</button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1 data-en="Welcome 👋" data-es="Bienvenido 👋" data-fr="Bienvenue 👋" data-de="Willkommen 👋">Welcome 👋</h1>
    <p data-en="Everything you need for your stay."
       data-es="Todo lo que necesitas para tu estancia."
       data-fr="Tout ce dont vous avez besoin pour votre séjour."
       data-de="Alles, was Sie für Ihren Aufenthalt brauchen.">
       Everything you need for your stay.
    </p>
  </div>

  <!-- HOUSE -->
  <div class="card">
    <h2 data-en="🏡 House Information"
        data-es="🏡 Información de la casa"
        data-fr="🏡 Informations sur le logement"
        data-de="🏡 Hausinformationen">
        🏡 House Information
    </h2>

    <p data-en="Please make yourself at home."
       data-es="Por favor, siéntete como en casa."
       data-fr="Faites comme chez vous."
       data-de="Fühlen Sie sich wie zu Hause.">
       Please make yourself at home.
    </p>

    <p>
      • WiFi: (add)<br>
      • Check-in/out: (add)
    </p>
  </div>

  <!-- MAPS -->
  <div class="card">
    <h2 data-en="📍 Local Guide"
        data-es="📍 Guía local"
        data-fr="📍 Guide local"
        data-de="📍 Lokaler Guide">
        📍 Local Guide
    </h2>

    <p data-en="Our curated recommendations."
       data-es="Nuestras recomendaciones."
       data-fr="Nos recommandations."
       data-de="Unsere Empfehlungen.">
       Our curated recommendations.
    </p>

    <a href="https://maps.app.goo.gl/HMr3f7wAdSFDgdmGA" target="_blank" class="button primary"
       data-en="🍽️ Food Spots"
       data-es="🍽️ Restaurantes"
       data-fr="🍽️ Restaurants"
       data-de="🍽️ Restaurants">
       🍽️ Food Spots
    </a>

    <br>

    <a href="https://maps.app.goo.gl/56Yh8cR3Par8S8hLA" target="_blank" class="button secondary"
       data-en="🌍 Things to Do"
       data-es="🌍 Qué visitar"
       data-fr="🌍 À visiter"
       data-de="🌍 Sehenswürdigkeiten">
       🌍 Things to Do
    </a>
  </div>

</div>

<script>
function setLang(lang) {
  document.querySelectorAll('[data-en]').forEach(el => {
    el.innerHTML = el.getAttribute('data-' + lang);
  });

  document.querySelectorAll('.lang-switch button').forEach(btn => {
    btn.classList.remove('active');
  });

  document.getElementById('btn-' + lang).classList.add('active');
}
</script>

</body>
</html>
